name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjson-glib-dev \
            libcurl4-openssl-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Package
        run: tar -czf axonsurf-linux-x64.tar.gz -C build axonsurf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonsurf-linux-x64
          path: axonsurf-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build ARM64 package in container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ubuntu:24.04 bash -lc "
              export DEBIAN_FRONTEND=noninteractive &&
              apt-get update &&
              apt-get install -y \
                build-essential \
                cmake \
                pkg-config \
                libgtk-3-dev \
                libwebkit2gtk-4.1-dev \
                libjson-glib-dev \
                libcurl4-openssl-dev &&
              cmake -S . -B build -DCMAKE_BUILD_TYPE=Release &&
              cmake --build build -j\$(nproc) &&
              tar -czf axonsurf-linux-arm64.tar.gz -C build axonsurf
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonsurf-linux-arm64
          path: axonsurf-linux-arm64.tar.gz

  release:
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-24.04

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: axonsurf-linux-x64
          path: dist/x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: axonsurf-linux-arm64
          path: dist/arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/x64/axonsurf-linux-x64.tar.gz
            dist/arm64/axonsurf-linux-arm64.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
