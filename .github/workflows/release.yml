name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libjson-glib-dev \
            libcurl4-openssl-dev \
            cmake \
            pkg-config

      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package
        run: |
          tar -czf axonsurf-linux-x64.tar.gz -C build axonsurf
          tar -czf axonsurf-linux-x64-with-deps.tar.gz -C build axonsurf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonsurf-linux-x64
          path: axonsurf-linux-x64.tar.gz

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build for ARM64
        run: |
          docker run --rm --platform linux/arm64 \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ubuntu:24.04 bash -c "
              apt-get update && apt-get install -y \
                libgtk-3-dev libwebkit2gtk-4.0-dev \
                libjson-glib-dev libcurl4-openssl-dev \
                cmake pkg-config build-essential &&
              mkdir build && cd build &&
              cmake .. -DCMAKE_BUILD_TYPE=Release &&
              make -j\$(nproc)
            "

      - name: Package
        run: tar -czf axonsurf-linux-arm64.tar.gz -C build axonsurf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axonsurf-linux-arm64
          path: axonsurf-linux-arm64.tar.gz

  release:
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            axonsurf-linux-x64/*.tar.gz
            axonsurf-linux-arm64/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
